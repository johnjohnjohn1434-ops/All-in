<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreativeFlow | Ultimate Media Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-border { border: 2px solid; border-image: linear-gradient(to right, #6366f1, #a855f7) 1; }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s ease; box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="min-h-screen">

    <!-- 🌟 TOP NAVIGATION -->
    <nav class="sticky top-0 z-50 glass border-b border-slate-800 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="showSection('home')">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/50">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h1 class="text-2xl font-black tracking-tighter italic">CREATIVE<span class="text-indigo-500">FLOW</span></h1>
        </div>
        
        <div class="hidden md:flex gap-8 font-semibold text-sm uppercase tracking-widest text-slate-400">
            <button onclick="showSection('video')" class="hover:text-indigo-400 transition">Videos</button>
            <button onclick="showSection('photo')" class="hover:text-indigo-400 transition">Photos</button>
            <button onclick="showSection('music')" class="hover:text-indigo-400 transition">Music</button>
            <button onclick="showSection('sound')" class="hover:text-indigo-400 transition">SFX</button>
        </div>

        <button id="authBtn" onclick="openAuthModal()" class="bg-slate-800 hover:bg-indigo-600 px-6 py-2 rounded-full text-sm font-bold transition">LOGIN</button>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">

        <!-- 🏠 HOME SECTION -->
        <section id="home-view" class="space-y-16">
            <!-- Hero with Search Box -->
            <div class="text-center py-10 space-y-8">
                <h2 class="text-5xl md:text-7xl font-extrabold tracking-tight">Design Everything. <br><span class="text-indigo-500 underline decoration-indigo-800">Download Anything.</span></h2>
                <div class="relative max-w-2xl mx-auto shadow-2xl">
                    <input type="text" id="mainSearch" onkeyup="searchAssets(this.value)" placeholder="Search for phonk, cars, nature, rain..." class="w-full bg-slate-900 border-2 border-slate-800 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-indigo-500 transition">
                    <div class="absolute right-4 top-4 bg-indigo-600 p-2 rounded-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></div>
                </div>
            </div>

            <!-- Recent Uploads Title -->
            <div class="space-y-6">
                <h3 class="text-2xl font-bold flex items-center gap-3"><span class="w-8 h-1 bg-indigo-500"></span> RECENT UPLOADS</h3>
                <div id="home-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            </div>
        </section>

        <!-- 📂 CATEGORY SECTION -->
        <section id="category-view" class="hidden space-y-8">
            <h2 id="cat-title" class="text-4xl font-black uppercase italic">Category</h2>
            <div id="cat-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- 🔐 ADMIN DASHBOARD -->
        <section id="admin-view" class="hidden space-y-12">
            <div class="flex justify-between items-center border-b border-slate-800 pb-6">
                <h2 class="text-3xl font-black text-indigo-400 italic">ADMIN PANEL</h2>
                <button onclick="logout()" class="text-red-400 font-bold hover:underline">LOGOUT</button>
            </div>

            <div class="grid md:grid-cols-2 gap-10">
                <!-- Upload Form -->
                <div class="glass p-8 rounded-3xl space-y-6">
                    <h3 class="text-xl font-bold">Upload New Content</h3>
                    <div class="space-y-4">
                        <select id="upType" onchange="loadCatOptions()" class="w-full bg-slate-800 p-4 rounded-xl outline-none">
                            <option value="video">Video</option>
                            <option value="photo">Photo</option>
                            <option value="music">Music</option>
                            <option value="sound">Sound Effect</option>
                        </select>
                        <select id="upCat" class="w-full bg-slate-800 p-4 rounded-xl outline-none"></select>
                        <input type="text" id="upTitle" placeholder="Asset Title" class="w-full bg-slate-800 p-4 rounded-xl outline-none">
                        <input type="file" id="upFile" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-600 file:text-white cursor-pointer">
                        <button onclick="handleUpload()" class="w-full bg-indigo-600 py-4 rounded-xl font-black tracking-widest hover:bg-indigo-500 transition">PUBLISH LIVE</button>
                    </div>
                </div>

                <!-- Delete/Manage Section -->
                <div class="glass p-8 rounded-3xl space-y-6">
                    <h3 class="text-xl font-bold">Manage Assets (Delete)</h3>
                    <div id="admin-manage-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- 🔑 LOGIN MODAL -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-[100]">
        <div class="glass max-w-md w-full p-10 rounded-3xl space-y-6 border-indigo-500/30">
            <div class="text-center">
                <h3 class="text-3xl font-black italic">LOGIN</h3>
                <p class="text-slate-400 text-sm mt-2">Enter your name or admin secret key</p>
            </div>
            <input type="text" id="loginKey" placeholder="Your Name or Admin Email" class="w-full bg-slate-800 p-4 rounded-xl outline-none border border-slate-700 focus:border-indigo-500">
            <button onclick="processLogin()" class="w-full bg-indigo-600 py-4 rounded-xl font-black tracking-widest">CONTINUE</button>
            <button onclick="closeAuthModal()" class="w-full text-slate-500 text-sm">Cancel</button>
        </div>
    </div>

    <script>
        // Database
        let db = JSON.parse(localStorage.getItem('mediaDB')) || [
            { id: 1, type: 'video', title: 'Cinematic Nature', cat: 'Nature', url: 'https://assets.mixkit.co/videos/preview/mixkit-forest-stream-in-the-sunlight-529-large.mp4' },
            { id: 2, type: 'photo', title: 'Sport Car Night', cat: 'Cars', url: 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800' },
            { id: 3, type: 'music', title: 'Hard Phonk Beat', cat: 'Phonk', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
            { id: 4, type: 'sound', title: 'Thunder Rain', cat: 'Rain', url: 'https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg' }
        ];

        const cats = {
            video: ['Nature', 'Gaming', 'Cartoon', 'Green Screen', 'Background'],
            photo: ['Nature', 'Cars', 'Animals', 'Wallpapers', 'AI Images'],
            music: ['Phonk', 'Cinematic', 'Funny', 'Sad', 'Motivation'],
            sound: ['Explosion', 'Rain', 'Thunder', 'Magic', 'Horror']
        };

        let isAdmin = false;

        // Core Functions
        window.onload = () => { renderGrid(db, 'home-grid'); loadCatOptions(); };

        function showSection(sec) {
            ['home-view', 'category-view', 'admin-view'].forEach(id => document.getElementById(id).classList.add('hidden'));
            if(sec === 'home') {
                document.getElementById('home-view').classList.remove('hidden');
                renderGrid(db, 'home-grid');
            } else if(sec === 'admin') {
                document.getElementById('admin-view').classList.remove('hidden');
                renderAdminList();
            } else {
                document.getElementById('category-view').classList.remove('hidden');
                document.getElementById('cat-title').innerText = sec;
                let filtered = db.filter(i => i.type === sec);
                renderGrid(filtered, 'cat-grid');
            }
        }

        function renderGrid(data, target) {
            const grid = document.getElementById(target);
            grid.innerHTML = '';
            data.forEach(item => {
                let preview = '';
                if(item.type === 'video') preview = `<video src="${item.url}" class="w-full h-48 object-cover"></video>`;
                else if(item.type === 'photo') preview = `<img src="${item.url}" class="w-full h-48 object-cover">`;
                else preview = `<div class="w-full h-48 bg-slate-800 flex items-center justify-center"><svg class="w-12 h-12 text-indigo-500" fill="currentColor" viewBox="0 0 20 20"><path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 3v11a3 3 0 102 2.82V7.82l8-1.6V12a3 3 0 102 2.82V3z"/></svg></div>`;

                grid.innerHTML += `
                    <div class="glass rounded-2xl overflow-hidden card-hover">
                        ${preview}
                        <div class="p-4 flex justify-between items-center">
                            <div><p class="font-bold truncate w-32">${item.title}</p><p class="text-xs text-slate-500">${item.cat}</p></div>
                            <a href="${item.url}" download class="bg-indigo-600 p-2 rounded-lg hover:scale-110 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg></a>
                        </div>
                        ${item.type === 'music' || item.type === 'sound' ? `<audio src="${item.url}" controls class="w-full h-8 opacity-50 px-2 pb-2"></audio>` : ''}
                    </div>`;
            });
        }

        function searchAssets(val) {
            let filtered = db.filter(i => i.title.toLowerCase().includes(val.toLowerCase()) || i.cat.toLowerCase().includes(val.toLowerCase()));
            renderGrid(filtered, 'home-grid');
        }

        // Admin Logic
        function loadCatOptions() {
            let type = document.getElementById('upType').value;
            let catSelect = document.getElementById('upCat');
            catSelect.innerHTML = cats[type].map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function handleUpload() {
            let file = document.getElementById('upFile').files[0];
            let title = document.getElementById('upTitle').value;
            if(!file || !title) return alert("Fill all details!");

            let newItem = {
                id: Date.now(),
                type: document.getElementById('upType').value,
                cat: document.getElementById('upCat').value,
                title: title,
                url: URL.createObjectURL(file)
            };
            db.unshift(newItem);
            localStorage.setItem('mediaDB', JSON.stringify(db));
            alert("Uploaded successfully! Check Home Page.");
            showSection('home');
        }

        function renderAdminList() {
            let list = document.getElementById('admin-manage-list');
            list.innerHTML = db.map(i => `
                <div class="flex justify-between items-center bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <p class="text-sm font-bold truncate w-40">${i.title} (${i.type})</p>
                    <button onclick="deleteAsset(${i.id})" class="text-rose-500 p-2 hover:bg-rose-500/10 rounded-lg transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                </div>
            `).join('');
        }

        function deleteAsset(id) {
            if(confirm("Are you sure to delete?")) {
                db = db.filter(i => i.id !== id);
                localStorage.setItem('mediaDB', JSON.stringify(db));
                renderAdminList();
                renderGrid(db, 'home-grid');
            }
        }

        // Auth Logic
        function openAuthModal() { document.getElementById('loginModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('loginModal').classList.add('hidden'); }
        
        function processLogin() {
            let val = document.getElementById('loginKey').value;
            if(val === "thivashthivash143@gmail.com*_*2009(*_*)/2009") {
                isAdmin = true;
                document.getElementById('authBtn').innerText = "ADMIN PANEL";
                document.getElementById('authBtn').onclick = () => showSection('admin');
                showSection('admin');
            } else {
                isAdmin = false;
                document.getElementById('authBtn').innerText = val.toUpperCase();
                alert("Welcome " + val);
            }
            closeAuthModal();
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
