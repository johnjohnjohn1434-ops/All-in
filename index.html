<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreativeFlow | Premium Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0a0a0a; 
            color: #ffffff; 
            margin-bottom: 80px; /* Space for bottom nav */
        }
        .asset-card {
            background: #151515;
            border: 1px solid #222;
            transition: all 0.3s ease;
        }
        .asset-card:hover {
            border-color: #6366f1;
            transform: translateY(-5px);
        }
        /* Desktop optimization: Grid size */
        @media (min-width: 1024px) {
            .asset-grid {
                grid-template-columns: repeat(5, 1fr); /* 5 items per row on desktop */
            }
        }
        .bottom-nav {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid #222;
        }
        .active-nav { color: #6366f1; }
    </style>
</head>
<body>

    <!-- 🔍 TOP SEARCH BAR -->
    <header class="p-4 sticky top-0 z-40 bg-black/80 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
            <h1 class="text-xl font-extrabold tracking-tighter text-indigo-500">CF<span class="text-white">STUDIO</span></h1>
            <div class="relative flex-grow max-w-md">
                <input type="text" id="mainSearch" onkeyup="searchAssets(this.value)" placeholder="Search assets..." class="w-full bg-[#1a1a1a] border border-[#333] rounded-full py-2 px-10 text-sm focus:outline-none focus:border-indigo-500">
                <svg class="w-4 h-4 absolute left-4 top-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            <button id="authBtn" onclick="openAuthModal()" class="text-xs font-bold bg-indigo-600 px-4 py-2 rounded-full">ADMIN</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4">
        <!-- Sections -->
        <div id="content-area">
            <h2 id="view-title" class="text-lg font-bold mb-6 flex items-center gap-2">
                <span class="w-2 h-6 bg-indigo-600 rounded-full"></span> Recent Uploads
            </h2>
            <div id="asset-grid" class="asset-grid grid grid-cols-2 md:grid-cols-3 gap-4">
                <!-- Assets appear here -->
            </div>
        </div>

        <!-- Admin View (Hidden by default) -->
        <section id="admin-view" class="hidden space-y-6">
            <h2 class="text-2xl font-bold">Admin Panel</h2>
            <div class="bg-[#151515] p-6 rounded-2xl border border-[#222]">
                <div class="grid gap-4">
                    <select id="upType" onchange="loadCatOptions()" class="bg-black border border-[#333] p-3 rounded-lg">
                        <option value="video">Video</option>
                        <option value="photo">Photo</option>
                        <option value="music">Song</option>
                        <option value="sound">Effect</option>
                    </select>
                    <input type="text" id="upTitle" placeholder="Asset Name" class="bg-black border border-[#333] p-3 rounded-lg">
                    <input type="file" id="upFile" class="text-sm">
                    <button onclick="handleUpload()" class="bg-indigo-600 py-3 rounded-lg font-bold">Upload to Site</button>
                </div>
            </div>
            <div id="admin-list" class="space-y-2">
                <!-- List for deleting -->
            </div>
        </section>
    </main>

    <!-- 📱 BOTTOM NAVIGATION (Always Visible) -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 z-50 flex justify-around items-center py-3">
        <button onclick="showSection('home')" class="flex flex-col items-center gap-1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-[10px] font-bold">Home</span>
        </button>
        <button onclick="showSection('video')" class="flex flex-col items-center gap-1 text-gray-500 hover:text-indigo-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            <span class="text-[10px] font-bold">Video</span>
        </button>
        <button onclick="showSection('photo')" class="flex flex-col items-center gap-1 text-gray-500 hover:text-indigo-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span class="text-[10px] font-bold">Photo</span>
        </button>
        <button onclick="showSection('music')" class="flex flex-col items-center gap-1 text-gray-500 hover:text-indigo-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
            <span class="text-[10px] font-bold">Song</span>
        </button>
        <button onclick="showSection('sound')" class="flex flex-col items-center gap-1 text-gray-500 hover:text-indigo-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
            <span class="text-[10px] font-bold">Effect</span>
        </button>
    </nav>

    <!-- Admin Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6">
        <div class="bg-[#151515] p-8 rounded-3xl w-full max-w-sm border border-[#333]">
            <h2 class="text-xl font-bold mb-4">Admin Login</h2>
            <input type="password" id="passInput" placeholder="Enter Password" class="w-full bg-black border border-[#333] p-3 rounded-lg mb-4">
            <button onclick="checkAdmin()" class="w-full bg-indigo-600 py-3 rounded-lg font-bold">Access</button>
            <button onclick="closeAuthModal()" class="w-full text-gray-500 mt-4 text-sm">Cancel</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('cf_data')) || [];

        window.onload = () => renderGrid(db);

        function renderGrid(data) {
            const grid = document.getElementById('asset-grid');
            grid.innerHTML = data.length ? '' : '<p class="col-span-full text-center text-gray-500 py-10">No assets found.</p>';
            data.forEach(item => {
                let preview = '';
                if(item.type === 'video') preview = `<video src="${item.url}" class="w-full aspect-video object-cover"></video>`;
                else if(item.type === 'photo') preview = `<img src="${item.url}" class="w-full aspect-video object-cover">`;
                else preview = `<div class="w-full aspect-video flex items-center justify-center bg-indigo-900/20 text-indigo-500"><svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>`;

                grid.innerHTML += `
                    <div class="asset-card rounded-xl overflow-hidden relative group">
                        ${preview}
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                            <button onclick="playMedia(this)" class="bg-white text-black p-3 rounded-full shadow-xl">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </button>
                        </div>
                        <div class="p-3">
                            <p class="text-xs font-bold truncate">${item.title}</p>
                            <a href="${item.url}" download class="text-[10px] text-indigo-400 mt-1 block">Download Free</a>
                        </div>
                    </div>`;
            });
        }

        function playMedia(btn) {
            const media = btn.closest('.asset-card').querySelector('video, audio');
            if(media) {
                document.querySelectorAll('video, audio').forEach(m => m.pause());
                media.paused ? media.play() : media.pause();
            }
        }

        function showSection(type) {
            document.getElementById('admin-view').classList.add('hidden');
            document.getElementById('content-area').classList.remove('hidden');
            const grid = document.getElementById('asset-grid');
            
            if(type === 'home') {
                document.getElementById('view-title').innerText = "Recent Uploads";
                renderGrid(db);
            } else {
                document.getElementById('view-title').innerText = type.toUpperCase();
                renderGrid(db.filter(i => i.type === type));
            }
        }

        function handleUpload() {
            const title = document.getElementById('upTitle').value;
            const file = document.getElementById('upFile').files[0];
            if(!title || !file) return alert("Fill all fields");

            const reader = new FileReader();
            reader.onload = function(e) {
                const newItem = {
                    id: Date.now(),
                    type: document.getElementById('upType').value,
                    title: title,
                    url: e.target.result
                };
                db.unshift(newItem);
                localStorage.setItem('cf_data', JSON.stringify(db));
                alert("Upload Success!");
                location.reload();
            };
            reader.readAsDataURL(file);
        }

        function searchAssets(val) {
            const filtered = db.filter(i => i.title.toLowerCase().includes(val.toLowerCase()));
            renderGrid(filtered);
        }

        function openAuthModal() { document.getElementById('loginModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('loginModal').classList.add('hidden'); }

        function checkAdmin() {
            const pass = document.getElementById('passInput').value;
            if(pass === "thivashthivash143@gmail.com*_*2009(*_*)/2009") {
                document.getElementById('content-area').classList.add('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                closeAuthModal();
                renderAdminList();
            } else {
                alert("Wrong Password");
            }
        }

        function renderAdminList() {
            const list = document.getElementById('admin-list');
            list.innerHTML = db.map(i => `
                <div class="flex justify-between bg-[#1a1a1a] p-3 rounded-lg border border-[#222]">
                    <span class="text-sm">${i.title} (${i.type})</span>
                    <button onclick="deleteAsset(${i.id})" class="text-red-500 text-xs font-bold">Delete</button>
                </div>
            `).join('');
        }

        function deleteAsset(id) {
            db = db.filter(i => i.id !== id);
            localStorage.setItem('cf_data', JSON.stringify(db));
            renderAdminList();
        }
    </script>
</body>
</html>
